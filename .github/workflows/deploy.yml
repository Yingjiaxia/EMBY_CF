name: Deploy to Cloudflare Workers

于:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Inject BASE_DOMAIN into wrangler.toml
        run: sed -i 's/BASE_DOMAIN = "example.com"/BASE_DOMAIN = "${{ secrets.BASE_DOMAIN }}"/g' wrangler.toml

      - name: Inject database_id into wrangler.toml
        run: sed -i 's/database_id = ""/database_id = "${{ secrets.D1_DATABASE_ID }}"/g' wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          secrets: |
            ADMIN_PASSWORD
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
